<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My App — v2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      text-align: center;
      padding: 48px 64px;
      border-radius: 20px;
      background: #1a3a1a;
      border: 2px solid #22c55e;
      box-shadow: 0 0 40px rgba(34,197,94,0.2);
    }
    .badge {
      display: inline-block;
      background: #22c55e;
      color: #000;
      padding: 6px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
    }
    h1 { font-size: 52px; font-weight: 800; margin-bottom: 12px; }
    .subtitle { color: #94a3b8; font-size: 18px; margin-bottom: 32px; }
    .meta { color: #475569; font-size: 12px; border-top: 1px solid #1e293b; padding-top: 20px; margin-top: 8px; }
    .dot { display: inline-block; width: 10px; height: 10px; background: #facc15;
           border-radius: 50%; margin-right: 6px; animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🟢 GREEN — Version 2</div>
    <h1>Hello from v2</h1>
    <p class="subtitle"><span class="dot"></span>New version — being monitored</p>
    <div class="meta">Routed by Anchor &nbsp;·&nbsp; Blue/Green Deployment Orchestrator</div>
  </div>
</body>
</html>
