services:
  # --- Application Containers ---
  blue:
    build:
      context: ./apps/blue
    container_name: blue
    ports:
      - "8001:8001"
    networks:
      - orchestrator-net
    restart: unless-stopped

  green:
    build:
      context: ./apps/green
    container_name: green
    ports:
      - "8002:8002"
    networks:
      - orchestrator-net
    restart: unless-stopped

  # --- Traffic Router ---
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - blue
      - green
    networks:
      - orchestrator-net
    restart: unless-stopped

  # --- Monitoring ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - blue
      - green
    networks:
      - orchestrator-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    depends_on:
      - prometheus
    networks:
      - orchestrator-net
    restart: unless-stopped

  # --- Orchestrator Service ---
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: orchestrator
    ports:
      - "8080:8080"
    volumes:
      - ./deploy.yml:/app/deploy.yml:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/nginx.template.conf:/app/nginx/nginx.template.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - BLUE_HOST=blue
      - GREEN_HOST=green
      - NGINX_TEMPLATE=/app/nginx/nginx.template.conf
      - NGINX_CONF=/etc/nginx/nginx.conf
      - ORCHESTRATOR_DB=/app/state.db
    depends_on:
      - blue
      - green
      - nginx
      - prometheus
    networks:
      - orchestrator-net
    restart: unless-stopped

networks:
  orchestrator-net:
    driver: bridge
