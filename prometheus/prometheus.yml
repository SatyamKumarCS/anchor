global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "blue"
    static_configs:
      - targets: ["blue:8001"]
        labels:
          color: "blue"
          version: "v1"

  - job_name: "green"
    static_configs:
      - targets: ["green:8002"]
        labels:
          color: "green"
          version: "v2"
